services:
  - type: web
    runtime: static
    name: grievance-frontend
    buildCommand: npm ci && GENERATE_SOURCEMAP=false node --max_old_space_size=4096 ./node_modules/react-scripts/bin/react-scripts.js build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://campus-grievance-system-backend.onrender.com
      # Render free-tier cold starts can exceed 15s; keep frontend HTTP timeouts higher.
      - key: REACT_APP_API_TIMEOUT_MS
        value: 60000

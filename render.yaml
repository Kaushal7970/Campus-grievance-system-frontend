services:
  - type: web
    runtime: static
    name: grievance-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://campus-grievance-system-backend.onrender.com
